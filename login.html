<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - 팀 매니저</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('ChatGPT Image 2026년 3월 2일 오후 08_04_19.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .login-box {
            background: white;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .login-title {
            font-size: 32px;
            font-weight: bold;
            color: #2d5016;
            margin-bottom: 10px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 40px;
        }

        .logo-section {
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 80px;
            margin-bottom: 15px;
        }

        .google-signin-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: #999;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        .divider::before {
            margin-right: 15px;
        }

        .divider::after {
            margin-left: 15px;
        }

        .info-text {
            color: #666;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #5ba83f;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #2d5016;
        }

        .manual-login-btn {
            display: none;
            width: 100%;
            padding: 15px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .manual-login-btn:hover {
            background: #357ae8;
            box-shadow: 0 4px 12px rgba(66, 133, 244, 0.3);
        }

        .features-list {
            text-align: left;
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .features-list h3 {
            color: #2d5016;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
        }

        .features-list ul {
            list-style: none;
            padding: 0;
        }

        .features-list li {
            padding: 8px 0;
            color: #555;
            font-size: 14px;
        }

        .features-list li::before {
            content: '✓ ';
            color: #5ba83f;
            font-weight: bold;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-section">
                <div class="logo-icon"></div>
                <div class="login-title">팀 매니저</div>
                <div class="login-subtitle">로그인하고 팀을 관리하세요</div>
            </div>

            <div class="info-text">
                구글 계정으로 로그인하면<br>
                모든 기록이 안전하게 저장됩니다
            </div>

            <!-- Google Sign-In 버튼 -->
            <div class="google-signin-container">
                <div id="g_id_onload"
                     data-client_id="YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-size="large"
                     data-theme="outline"
                     data-text="sign_in_with"
                     data-shape="rectangular"
                     data-logo_alignment="left">
                </div>
            </div>

            <!-- 수동 로그인 버튼 (개발/테스트용) -->
            <button class="manual-login-btn" onclick="manualLogin()">
                🧪 테스트 로그인 (개발용)
            </button>

            <div class="divider">또는</div>

            <div class="features-list">
                <h3>로그인하면 사용 가능</h3>
                <ul>
                    <li>기록실: 시즌별 선수 기록 관리</li>
                    <li>나의팀: 팀 정보 확인 및 수정</li>
                    <li>팀 정보 수정: 상세 정보 편집</li>
                </ul>
            </div>

            <div class="divider">로그인 없이 사용 가능</div>

            <div class="features-list">
                <h3>자유롭게 이용하세요</h3>
                <ul>
                    <li>축구/풋살 팀 짜기</li>
                    <li>선수 배치 및 팀 구성</li>
                </ul>
            </div>

            <a href="index.html" class="back-link">← 메인으로 돌아가기</a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // 개발/테스트용 수동 로그인 버튼 표시 (실제 배포시 제거)
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            document.querySelector('.manual-login-btn').style.display = 'block';
        }

        // 테스트용 수동 로그인
        function manualLogin() {
            const testUser = {
                sub: 'test_user_123',
                name: '테스트 사용자',
                email: 'test@example.com',
                picture: '',
                iat: Date.now(),
                exp: Date.now() + 86400000 // 24시간 후
            };

            authManager.saveUser(testUser);
            alert('테스트 로그인 성공!');
            window.location.href = 'index.html';
        }

        // 이미 로그인한 경우 메인으로 리다이렉트
        if (authManager.isLoggedIn()) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
